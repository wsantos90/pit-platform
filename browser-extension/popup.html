<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PIT Collect</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <p class="eyebrow">PIT Collect 1.1.0</p>
          <h1>Cookies EA capturados</h1>
        </div>
        <span class="status-pill" id="sync-status">Carregando...</span>
      </header>

      <section class="meta-panel">
        <article class="meta-card">
          <p class="label">Build</p>
          <strong id="build-mode">-</strong>
        </article>
        <article class="meta-card">
          <p class="label">Destino do sync</p>
          <strong id="cookie-service-label">-</strong>
        </article>
      </section>

      <section class="panel-grid">
        <article class="panel">
          <p class="label">ak_bmsc</p>
          <textarea id="ak-bmsc" readonly></textarea>
        </article>
        <article class="panel">
          <p class="label">bm_sv</p>
          <textarea id="bm-sv" readonly></textarea>
        </article>
      </section>

      <section class="stats-grid">
        <article class="stat-card">
          <p class="label">Cookies .ea.com</p>
          <strong id="cookie-count">-</strong>
        </article>
        <article class="stat-card">
          <p class="label">Ultima captura</p>
          <strong id="captured-at">-</strong>
        </article>
        <article class="stat-card">
          <p class="label">Ultimo sync</p>
          <strong id="last-sync-at">-</strong>
        </article>
      </section>

      <section class="panel">
        <p class="label">Erro do ultimo sync</p>
        <p class="message" id="last-sync-error">-</p>
      </section>

      <section class="actions">
        <button id="refresh-button" class="secondary">Atualizar cookies</button>
        <button id="sync-button">Sincronizar agora</button>
      </section>

      <p class="footer" id="sync-hint">Use este popup para confirmar se os cookies do Edge/Chrome foram capturados antes do Collect ou do Discovery.</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
